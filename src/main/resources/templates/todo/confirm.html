<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録内容の確認</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-4">登録内容の確認</h1>

                        <form th:action="@{/todo/complete}" method="post">
                            <div class="card border bg-body-tertiary mb-4">
                                <div class="card-body">
                                    <h2 class="h5 mb-3">ToDo情報</h2>
                                    <div>
                                        <label for="title" class="form-label text-muted">タイトル</label>
                                        <input id="title" type="text" class="form-control" th:value="${title}" readonly>
                                        <input type="hidden" name="title" th:value="${title}">
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">登録</button>
                                <button type="button" class="btn btn-outline-secondary" onclick="history.back()">戻る</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
