<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録内容の確認</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-4">登録内容の確認</h1>

                        <div class="card border bg-body-tertiary mb-4">
                            <div class="card-body">
                                <h2 class="h5 mb-3">ToDo情報</h2>
                                <dl class="row mb-0">
                                    <dt class="col-sm-4 text-muted">タイトル</dt>
                                    <dd class="col-sm-8" th:text="${title}">サンプルタスク</dd>

                                    <dt class="col-sm-4 text-muted">説明</dt>
                                    <dd class="col-sm-8" th:text="${description}">説明文</dd>

                                    <dt class="col-sm-4 text-muted">重要度</dt>
                                    <dd class="col-sm-8" th:text="${priority}">中</dd>
                                </dl>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/todo/complete}" class="btn btn-success">登録</a>
                            <a th:href="@{/todo/new}" class="btn btn-outline-secondary">戻る</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
