<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo一覧</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">ToDo一覧</h1>
            <a th:href="@{/todo/new}" class="btn btn-primary">新規登録</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" class="px-4 py-3">ID</th>
                                <th scope="col" class="py-3">タイトル</th>
                                <th scope="col" class="py-3">ステータス</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="todo : ${todoList}">
                                <td class="px-4" th:text="${todo.id}">1</td>
                                <td th:text="${todo.title}">Spring Bootの学習</td>
                                <td>
                                    <span class="badge text-bg-secondary" th:text="${todo.status}">進行中</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(todoList)}">
                                <td colspan="3" class="text-center text-muted py-4">ToDoはまだ登録されていません。</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
