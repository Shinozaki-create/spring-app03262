<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo一覧</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-1">ToDo一覧</h1>
                <p class="text-muted mb-0">登録済みのタスクを確認できます。</p>
            </div>
            <a th:href="@{/todo/new}" class="btn btn-primary">新規登録</a>
        </div>

        <div th:if="${#lists.isEmpty(todos)}" class="card border-0 shadow-sm overflow-hidden">
            <div class="card-body p-5 text-center">
                <div class="mx-auto mb-4 d-flex align-items-center justify-content-center rounded-circle bg-primary-subtle text-primary"
                     style="width: 88px; height: 88px; font-size: 2rem; font-weight: 700;">
                    T
                </div>
                <h2 class="h4 mb-3">ToDoがまだ登録されていません</h2>
                <p class="text-muted mb-4">
                    最初のタスクを作成すると、ここに一覧で表示されます。<br>
                    今日やることをひとつ登録して、管理を始めましょう。
                </p>
                <a th:href="@{/todo/new}" class="btn btn-primary btn-lg px-4">新規作成</a>
            </div>
        </div>

        <div th:unless="${#lists.isEmpty(todos)}" class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" class="px-4 py-3">ID</th>
                                <th scope="col" class="py-3">タイトル</th>
                                <th scope="col" class="py-3">完了状態</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="todo : ${todos}">
                                <td class="px-4" th:text="${todo.id}">1</td>
                                <td class="fw-semibold" th:text="${todo.title}">Spring Bootの学習</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${todo.completed} ? ' text-bg-success' : ' text-bg-secondary'"
                                          th:text="${todo.completed} ? '完了' : '未完了'">未完了</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
